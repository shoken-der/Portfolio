<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications | Shokendra Singh</title>
    <link rel="icon" href="assets/icons/icon3.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="css/home.css?v=2.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-[var(--peach-puff)] to-[var(--pastel-pink)] text-[var(--dark-text)] font-sans">
    <div id="particles-js" class="fixed top-0 left-0 w-full h-full z-0"></div>
    <div class="floating-elements absolute inset-0 z-1" id="floatingElements"></div>
    <div id="header-placeholder"></div>

    <main class="pt-24 px-[10%] relative z-10 min-h-screen pb-16">
        <section class="certifications-section">
            <div class="text-center mb-12" data-aos="fade-down">
                <h1
                    class="text-5xl mt-4 font-bold mb-4 bg-gradient-to-r from-[var(--pastel-pink)] to-[var(--dark-text)] bg-clip-text text-transparent">
                    Certifications
                </h1>
                <div
                    class="w-24 h-1 bg-gradient-to-r from-[var(--pastel-pink)] to-[var(--dark-text)] mx-auto rounded-full">
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-center items-stretch gap-8 max-w-4xl mx-auto flex-1 h-full">
                <!-- Java Certification -->
                <div class="bg-white/20 backdrop-blur-lg rounded-xl p-8 shadow-xl text-center group hover:bg-white/30 transition-all w-full md:w-1/2 flex flex-col items-center flex-1 h-full min-h-[300px] border border-white/10 hover:border-white/30"
                    data-aos="fade-up">
                    <div class="flex-grow flex flex-col justify-center items-center w-full">
                        <i
                            class="fab fa-java text-6xl text-[#e32d2d] mb-6 group-hover:scale-110 transition-all duration-300"></i>
                        <h3 class="text-2xl font-bold mb-3 text-[var(--dark-text)]">Java Core to Advance</h3>
                        <p class="text-lg opacity-90 font-medium mb-4">Board Infinity</p>
                        <span
                            class="inline-block px-4 py-1.5 bg-[var(--dark-text)] text-[var(--peach-puff)] text-sm font-bold uppercase tracking-wider rounded-full shadow-inner">
                            Completion Expert
                        </span>
                    </div>
                    <div class="mt-8 w-full pt-4 border-t border-white/20">
                        <a href="https://drive.google.com/file/d/1zTqACaLxoSDWmoXW7VpCDm5_GquMSbxA/view?usp=sharing"
                            target="_blank" rel="noopener noreferrer"
                            class="inline-flex justify-center items-center gap-2 text-lg font-bold text-[var(--dark-text)] hover:opacity-80 transition-all py-2 px-4 rounded-lg w-full group/link"
                            style="outline: none !important; border: none !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent;">
                            <span>View Certificate</span>
                            <i class="fas fa-link text-xl group-hover/link:scale-110 transition-transform"></i>
                        </a>
                    </div>
                </div>

                <!-- Social Networks Certification -->
                <div class="bg-white/20 backdrop-blur-lg rounded-xl p-8 shadow-xl text-center group hover:bg-white/30 transition-all w-full md:w-1/2 flex flex-col items-center flex-1 h-full min-h-[300px] border border-white/10 hover:border-white/30"
                    data-aos="fade-up" data-aos-delay="100">
                    <div class="flex-grow flex flex-col justify-center items-center w-full">
                        <i
                            class="fas fa-network-wired text-6xl text-[#0d6efd] mb-6 group-hover:scale-110 transition-all duration-300"></i>
                        <h3 class="text-2xl font-bold mb-3 text-[var(--dark-text)]">Social Networks</h3>
                        <p class="text-lg opacity-90 font-medium mb-4">NPTEL</p>
                        <span
                            class="inline-block px-4 py-1.5 bg-[var(--dark-text)] text-[var(--peach-puff)] text-sm font-bold uppercase tracking-wider rounded-full shadow-inner">
                            Verified Professional
                        </span>
                    </div>
                    <div class="mt-8 w-full pt-4 border-t border-white/20">
                        <a href="https://drive.google.com/file/d/1QecDXLVPTkVLFfPyRM5CdahvU178gGCq/view?usp=sharing"
                            target="_blank" rel="noopener noreferrer"
                            class="inline-flex justify-center items-center gap-2 text-lg font-bold text-[var(--dark-text)] hover:opacity-80 transition-all py-2 px-4 rounded-lg w-full group/link"
                            style="outline: none !important; border: none !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent;">
                            <span>View Certificate</span>
                            <i class="fas fa-link text-xl group-hover/link:scale-110 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/main.js?v=2.3"></script>
    <script src="js/header.js?v=2.3"></script>
    <script>
        fetch('header.html?v=2.3').then(r => r.text()).then(d => { document.getElementById('header-placeholder').innerHTML = d; });
        AOS.init({ duration: 800, once: true });
    </script>
</body>

</html>
